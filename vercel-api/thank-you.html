<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Thank you - Viator Reply by AI Pro</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.25rem; }
    .key { font-family: monospace; background: #f3f4f6; padding: 12px; border-radius: 8px; word-break: break-all; margin: 16px 0; }
    .copy { margin-top: 8px; font-size: 14px; color: #666; }
    a { color: #0d9488; }
  </style>
</head>
<body>
  <h1>Thank you for going Pro</h1>
  <p id="message">Loading your license key...</p>
  <p id="keyBlock" style="display: none;">Your license key (copy and paste into the extension options):<br><span id="key" class="key"></span><br><span class="copy">Paste this in the extension Options under "License key" and click Activate.</span></p>
  <p id="cancelled" style="display: none;">Payment was cancelled. You can <a href="/api/checkout">try again</a>.</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const cancelled = params.get('cancelled');
    const messageEl = document.getElementById('message');
    const keyBlock = document.getElementById('keyBlock');
    const keyEl = document.getElementById('key');
    const cancelledEl = document.getElementById('cancelled');
    if (cancelled) {
      messageEl.style.display = 'none';
      cancelledEl.style.display = 'block';
    } else if (sessionId) {
      let attempt = 0;
      const maxAttempts = 12;
      const delayMs = 2000;
      function fetchKey() {
        attempt++;
        if (attempt > 1) messageEl.textContent = 'Loading your license key... (' + attempt + '/' + maxAttempts + ')';
        fetch('/api/thank-you?session_id=' + encodeURIComponent(sessionId))
          .then(r => r.json())
          .then(data => {
            if (data.key) {
              keyEl.textContent = data.key;
              keyBlock.style.display = 'block';
              messageEl.style.display = 'none';
            } else if (attempt < maxAttempts) {
              setTimeout(fetchKey, delayMs);
            } else {
              messageEl.textContent = 'Key not found or already retrieved. If you need help, contact support.';
            }
          })
          .catch(() => {
            if (attempt < maxAttempts) setTimeout(fetchKey, delayMs);
            else messageEl.textContent = 'Failed to load your key. Please try again or contact support.';
          });
      }
      fetchKey();
    } else {
      messageEl.textContent = 'No session. If you just paid, go to the extension Options and check your email for the license key.';
    }
  </script>
</body>
</html>
