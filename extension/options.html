<!DOCTYPE html>
<!-- Viator "Reply by AI" Chrome Extension - Options page | Copyright © Anywhere.tours -->
<html>
<head>
  <meta charset="utf-8">
  <title>Viator Reply by AI - Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 1.25rem; margin-bottom: 16px; }
    h2 { font-size: 1rem; margin-top: 24px; margin-bottom: 10px; }
    label { display: block; font-weight: 500; margin-bottom: 6px; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .hint { font-size: 12px; color: #666; margin-top: 6px; margin-bottom: 16px; }
    .hint a { color: #007bff; }
    .buttons { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    button {
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }
    button.primary { background: #0d9488; color: white; }
    button.primary:hover { background: #0f766e; }
    button.secondary { background: #e5e7eb; color: #374151; }
    button.secondary:hover { background: #d1d5db; }
    .status { margin-top: 12px; font-size: 13px; min-height: 20px; }
    .status.success { color: #059669; }
    .status.error { color: #dc2626; }
    .pro-badge { font-size: 12px; color: #059669; font-weight: 500; }
    .section { margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Viator Reply by AI - Settings</h1>

  <section class="section">
    <label for="apiKey">Gemini API key</label>
    <input type="password" id="apiKey" placeholder="Enter your Gemini API key" autocomplete="off">
    <p class="hint">
      Get a free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
      Your key is stored locally and only used by this extension to generate replies.
    </p>
    <div class="buttons">
      <button type="button" class="primary" id="save">Save</button>
      <button type="button" class="secondary" id="clear">Clear</button>
    </div>
    <p class="status" id="status"></p>
  </section>

  <section class="section">
    <h2>Pro</h2>
    <p class="hint">Unlock more options with Pro ($1).</p>
    <p class="hint">
      <a href="https://ai.majidorc.com/api/checkout" target="_blank" rel="noopener">Get Pro</a>
    </p>
    <div id="proNotActive">
      <label for="licenseKey">License key</label>
      <input type="text" id="licenseKey" placeholder="Paste your license key" autocomplete="off">
      <div class="buttons">
        <button type="button" class="primary" id="activate">Activate</button>
      </div>
    </div>
    <div id="proActive" style="display: none;">
      <p class="pro-badge">Pro active</p>
      <div class="buttons">
        <button type="button" class="secondary" id="deactivate">Deactivate</button>
      </div>
    </div>
    <p class="status" id="proStatus"></p>
  </section>

  <p style="margin-top: 24px; font-size: 12px;">
    <a href="https://anywhere.tours" target="_blank" rel="noopener" style="color: #666; text-decoration: none;">© Anywhere.tours</a>
  </p>
  <script src="options.js"></script>
</body>
</html>
