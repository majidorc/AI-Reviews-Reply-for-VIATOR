<!DOCTYPE html>
<!-- Viator "Reply by AI" Chrome Extension - Options page | Copyright © Anywhere.tours -->
<html>
<head>
  <meta charset="utf-8">
  <title>Viator Reply by AI - Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      margin-bottom: 16px;
    }
    .hint a {
      color: #007bff;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }
    button.primary {
      background: #0d9488;
      color: white;
    }
    button.primary:hover {
      background: #0f766e;
    }
    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }
    button.secondary:hover {
      background: #d1d5db;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }
    .status.success { color: #059669; }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Viator Reply by AI - Settings</h1>
  <label for="apiKey">Gemini API key</label>
  <input type="password" id="apiKey" placeholder="Enter your Gemini API key" autocomplete="off">
  <p class="hint">
    Get a free API key from <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
    Your key is stored locally and only used by this extension to generate replies.
  </p>
  <div class="buttons">
    <button type="button" class="primary" id="save">Save</button>
    <button type="button" class="secondary" id="clear">Clear</button>
  </div>
  <p class="status" id="status"></p>
  <p style="margin-top: 24px; font-size: 12px; color: #666;">© Anywhere.tours</p>
  <script src="options.js"></script>
</body>
</html>
